name: Android CI

on:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/ci_android.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'android/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/ci_android.yaml'
  workflow_dispatch:

env:
  ANDROID_API: "26"
  ABI: "arm64-v8a"
  NDK_VERSION: "27.2.12479018"
  # '6.8.*' resolves to the latest available 6.8.x patch on the Qt mirror.
  # The install-qt-action handles mirror instability that breaks raw aqt.
  QT_VERSION: "6.8.*"
  OPENSSL_VERSION: "3.3.2"
  BOOST_VERSION: "1.87.0"
  LIBTORRENT_VERSION: "2.0.10"

jobs:
  build:
    name: Build qBittorrent Android APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build cmake \
            libgl1-mesa-dev libglib2.0-dev libxkbcommon-dev

      # install-qt-action@v4 wraps aqt but stays in sync with Qt mirror
      # infrastructure changes. Raw aqt 3.3.0 is broken for Qt 6.8.x
      # because Qt restructured their package manifest format.
      - name: Install Qt host tools (gcc_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: gcc_64
          dir: ${{ github.workspace }}/Qt
          cache: true
          cache-key-prefix: qt-host

      - name: Save Qt host root and resolved version
        run: |
          echo "QT_HOST_ROOT=${QT_ROOT_DIR}" >> "$GITHUB_ENV"
          # Extract the resolved patch version from the install path
          # e.g. /…/Qt/6.8.3/gcc_64  →  6.8.3
          QT_RESOLVED=$(basename "$(dirname "${QT_ROOT_DIR}")")
          echo "QT_RESOLVED=${QT_RESOLVED}" >> "$GITHUB_ENV"

      - name: Install Qt for Android (arm64-v8a)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_RESOLVED }}
          host: linux
          target: android
          arch: android_arm64_v8a
          dir: ${{ github.workspace }}/Qt
          cache: true
          cache-key-prefix: qt-android

      - name: Save Qt Android root
        run: |
          echo "QT_ANDROID_ROOT=${QT_ROOT_DIR}" >> "$GITHUB_ENV"

      - name: Cache native dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: android/deps
          key: deps-api${{ env.ANDROID_API }}-ssl${{ env.OPENSSL_VERSION }}-boost${{ env.BOOST_VERSION }}-lt${{ env.LIBTORRENT_VERSION }}-ndk${{ env.NDK_VERSION }}-static-v1

      - name: Build native dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          export ANDROID_API="${ANDROID_API}"
          export ABI="${ABI}"
          export OPENSSL_VERSION="${OPENSSL_VERSION}"
          export BOOST_VERSION="${BOOST_VERSION}"
          export LIBTORRENT_VERSION="${LIBTORRENT_VERSION}"
          export JOBS="$(nproc)"
          bash android/scripts/build-deps.sh

      - name: Cache qBittorrent CMake build dir
        id: cache-qbt
        uses: actions/cache@v4
        with:
          path: android/build/qbt
          key: qbt-${{ hashFiles('src/**', 'CMakeLists.txt', 'cmake/**') }}-api${{ env.ANDROID_API }}-ndk${{ env.NDK_VERSION }}-qt${{ env.QT_RESOLVED }}-static-v1

      - name: Build qBittorrent-nox for Android
        run: |
          export ANDROID_NDK_ROOT="${ANDROID_NDK_ROOT}"
          export QT_ANDROID_ROOT="${QT_ANDROID_ROOT}"
          export QT_HOST_ROOT="${QT_HOST_ROOT}"
          export ANDROID_API="${ANDROID_API}"
          export ABI="${ABI}"
          export JOBS="$(nproc)"
          bash android/scripts/build-qbt.sh

      - name: Verify native binary
        run: |
          BIN="android/app/src/main/jniLibs/arm64-v8a/libqbittorrent_nox.so"
          ls -lh "${BIN}"
          file "${BIN}"
          if readelf -d "${BIN}" | grep -q "libc++_shared"; then
            echo "ERROR: binary depends on libc++_shared.so — rebuild with ANDROID_STL=c++_static"
            exit 1
          fi
          echo "STL check passed: binary is self-contained"

      - name: Bootstrap Gradle wrapper JAR
        run: bash android/scripts/bootstrap-gradle.sh

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/libs.versions.toml') }}-v1
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: qbittorrent-android-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        working-directory: android
        run: ./gradlew :app:assembleRelease --no-daemon -x lintRelease

      - name: Upload release APK (unsigned)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: qbittorrent-android-release-unsigned-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90
